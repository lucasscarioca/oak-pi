<!doctype html>
<html lang="en" data-palette="warm-walnut">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Design Option</title>
    <link rel="stylesheet" href="../../../tokens.css" />
    <style>
      body {
        margin: 0;
        background: var(--color-bg);
        color: var(--color-text);
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      .frame {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      .mock {
        width: min(1200px, 100%);
        min-height: 720px;
        border: 1px solid var(--color-border);
        background: var(--color-surface);
        padding: 28px;
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <section class="mock">
        Replace this with a static design mock. Keep it mock-first and consume semantic tokens only.
      </section>
    </main>
    <script>
      const paletteStorageKey = "design-catalog-palette";
      const params = new URLSearchParams(window.location.search);
      const palette = params.get("palette") || localStorage.getItem(paletteStorageKey);

      if (palette) {
        document.documentElement.dataset.palette = palette;
      }

      window.addEventListener("storage", (event) => {
        if (event.key === paletteStorageKey && event.newValue) {
          document.documentElement.dataset.palette = event.newValue;
        }
      });
    </script>
  </body>
</html>
